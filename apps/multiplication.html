<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>תרגילי כפל אקראיים</title>
        <style>
            li {
                font-size: 18px;
            }
            h1 {direction: rtl;}
            ol {
                counter-reset: list;
            }
            ol > li {
                list-style: none;
            }
            ol > li:before {
                content: counter(list) ") ";
                counter-increment: list;
            }
            li.menu-item:not(:last-child) { 
               margin-bottom: 5px;  
            }
        </style>
    </head>
    <body>
        <h1>30 תרגילי כפל אקראיים של מספרים 1-10:</h1>
        <ol id="exercises"></ol>
        <script>
            let html = "";
            for(let i=0; i<30; i++) {
                let x = Math.floor(Math.random() * 10 + 1);
                let y = Math.floor(Math.random() * 10 + 1);
                let txt = x + " &#215; " + y + " = ";
                html += "<li><i>" + txt + "</i></li>";
            }
            document.getElementById("exercises").innerHTML = html;
        </script>
    </body>
</html>
